<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Who Eats Token Adapter</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        box-sizing: border-box;
        min-width: 360px;
        max-width: 720px;
        margin: 0;
        padding: 24px;
        background: Canvas;
        color: CanvasText;
      }

      main {
        display: grid;
        gap: 18px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
      }

      p {
        margin: 0;
        color: color-mix(in srgb, CanvasText 70%, transparent);
        line-height: 1.5;
      }

      label {
        display: grid;
        gap: 8px;
        font-weight: 650;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid color-mix(in srgb, CanvasText 24%, transparent);
        border-radius: 8px;
        padding: 10px 12px;
        background: Canvas;
        color: CanvasText;
        font: inherit;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 750;
        cursor: pointer;
        background: #95f3b1;
        color: #102015;
      }

      button.secondary {
        background: color-mix(in srgb, CanvasText 12%, transparent);
        color: CanvasText;
      }

      #status {
        min-height: 22px;
        font-weight: 650;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Who Eats Token Adapter</h1>
      <p>把支持的网页工具遮挡信息和显式 usage 事件转发到本机 Who Eats Token。</p>

      <label class="row">
        <input id="enabled" type="checkbox">
        启用浏览器适配器
      </label>

      <label>
        本地 API 地址
        <input id="endpoint" type="text" spellcheck="false" autocomplete="off">
      </label>

      <label>
        本地访问 token
        <input id="token" type="password" spellcheck="false" autocomplete="off">
      </label>

      <div class="actions">
        <button id="save" type="button">保存</button>
        <button id="test" class="secondary" type="button">测试连接</button>
      </div>

      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script src="options.js"></script>
  </body>
</html>
