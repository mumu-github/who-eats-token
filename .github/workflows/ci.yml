name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2025-vs2026, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22.12"
          cache: npm
      - run: npm ci
      - run: npm run release:check
      - run: npm run secret:scan
      - run: npm run license:check
      - run: npm audit --audit-level=high --registry=https://registry.npmjs.org/
