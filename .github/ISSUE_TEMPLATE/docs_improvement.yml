name: Docs or improvement
description: Report a documentation gap, starter task, or small maintainability improvement.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not include API keys, cookies, local tokens, prompts, completions, private source files, raw logs, or account screenshots.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - First contribution path
        - Adapter docs
        - Release or validation docs
        - Privacy or security docs
        - Runtime documentation
        - Other documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or missing?
      placeholder: Describe the gap and where you expected to find the answer.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Suggested improvement
      placeholder: Link the file or section if you know where it belongs.
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution fit
      options:
        - label: This looks suitable for a first-time contributor.
        - label: This needs a real host machine, account access, or signing credentials.
        - label: I removed secrets and account-specific details.
          required: true
