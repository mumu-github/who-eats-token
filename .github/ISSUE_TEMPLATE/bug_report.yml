name: Bug report
description: Report a reproducible problem in the desktop app, adapters, or packaging.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste API keys, provider cookies, local tokens, raw databases, or full chat logs.
        For HUD disappearance, stale quota, lag, or memory issues, please include redacted `npm run support:bundle -- -- --json` output.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Desktop HUD/top bar
        - Windows packaging
        - macOS packaging
        - Browser extension
        - VS Code/Cursor adapter
        - Hermes bridge
        - Node SDK/protocol
        - MCP server
        - Other
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 10
        - Windows 11
        - macOS Intel
        - macOS Apple Silicon
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Keep it concrete and minimal.
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Include redacted command output such as `npm run support:bundle -- -- --json`, `npm run diagnostics -- -- --json`, `npm run status -- -- --json`, `npm run stability -- -- --json`, release checks, packaged smoke output, or adapter test output.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety checklist
      options:
        - label: I removed API keys, cookies, local access tokens, and account screenshots.
          required: true
        - label: I tried the latest documented check for the affected area when possible.
          required: false
