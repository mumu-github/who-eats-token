<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM HUD</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="hud-body">
    <main class="hud">
      <div class="hud-head">
        <span class="hud-dot"></span>
        <span id="toolName">LLM</span>
        <span class="hud-plan" id="hudPlan">余量</span>
        <span class="hud-trust" id="hudTrust">等待</span>
        <button class="hud-settings" id="hudSettings" type="button" title="打开设置" aria-label="打开设置" tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19 12a7 7 0 0 0-.1-1.2l2-1.5-2-3.5-2.4 1a7 7 0 0 0-2-1.2L14.2 3h-4.4l-.4 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.5 2 1.5A7 7 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.5 2.4-1a7 7 0 0 0 2 1.2l.4 2.6h4.4l.4-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.5-2-1.5c.1-.4.1-.8.1-1.2Z"></path>
          </svg>
        </button>
      </div>
      <div class="hud-stats">
        <div class="hud-stat" id="hudFiveMetric">
          <span class="hud-label">
            <svg class="label-icon" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8"></circle>
              <path d="M12 7v5l3 2"></path>
            </svg>
            <span id="hudFiveLabelText">5小时</span>
          </span>
          <strong id="hudFiveHour">--</strong>
        </div>
        <div class="hud-stat" id="hudWeekMetric">
          <span class="hud-label">
            <svg class="label-icon" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="6" width="14" height="13" rx="3"></rect>
              <path d="M8 4v4M16 4v4M5 10h14"></path>
            </svg>
            <span id="hudWeekLabelText">一周</span>
          </span>
          <strong id="hudWeek">--</strong>
        </div>
        <div class="hud-chart" id="hudChart" aria-label="余量小图表">
          <span class="chart-column chart-five" title="5小时余量">
            <span class="chart-track"><span class="chart-fill"></span></span>
            <span class="chart-caption" id="hudFiveCaption">5h</span>
          </span>
          <span class="chart-column chart-week" title="一周余量">
            <span class="chart-track"><span class="chart-fill"></span></span>
            <span class="chart-caption" id="hudWeekCaption">7d</span>
          </span>
        </div>
        <div class="hud-mascot" id="hudMascot" aria-hidden="true">
          <span class="mascot-leaf left"></span>
          <span class="mascot-leaf right"></span>
          <span class="mascot-face"></span>
          <span class="mascot-bowl"></span>
          <span class="token-link token-main"></span>
          <span class="token-link token-spark"></span>
        </div>
      </div>
      <div class="hud-footer">
        <span class="hud-predict" id="hudPredict">等待接入</span>
        <span class="hud-meta" id="hudMeta">等待数据</span>
      </div>
    </main>
    <script src="./shared/format.js"></script>
    <script src="./shared/quota-view-model.js"></script>
    <script src="./shared/trust-popover.js"></script>
    <script src="./hud.js"></script>
  </body>
</html>
